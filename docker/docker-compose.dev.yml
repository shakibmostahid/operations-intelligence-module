services:
  app:
    volumes:
      - ../codes:/var/www/html
    command: ["dev"]
    ports:
      - "5173:5173"

  nginx:
    environment:
      SYNC_PUBLIC_ASSETS: "false"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ../codes/public:/var/www/html/public
      - ./configs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
