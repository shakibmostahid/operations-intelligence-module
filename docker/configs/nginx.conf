map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_x_forwarded_host $forwarded_host {
    default $http_x_forwarded_host;
    "" $http_host;
}

map $http_x_forwarded_port $forwarded_port {
    default $http_x_forwarded_port;
    "" $server_port;
}

server {
    listen 80;
    root /var/www/html/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /build/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:css|js|map|png|jpe?g|gif|svg|ico|webp|woff2?|ttf)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        try_files $uri =204;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_X_FORWARDED_FOR $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_PROTO $forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $forwarded_port;
        include fastcgi_params;
    }
}
